<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    
    <div class="giris">Pomodoro Timer'a hoş geldin!</div>
    <div class="timer" id="timeText">25:00</div>
    <div class="tuslar">
        <button class="btn btn-primary start" id="startBtn">Sayacı Başlat</button>
        <button class="btn btn-secondary start" id="stopBtn">Duraklat</button>
        <button class="btn btn-danger start" id="restartBtn">Sıfırla</button>
    </div>

    <div class="tasks">

        <div class="form-control">
            <div class="task-add">
                <input class="form-control" id="gorevText" type="text">
                <button class="btn btn-secondary gorev-ekle" id="gorevEkleBtn">Görev Ekle</button>

            </div>
            <ul id="gorev-listesi" class="gorev-listesi"></ul>
        </div>
    </div>



</body>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
